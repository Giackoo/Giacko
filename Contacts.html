    <title>Typing Header</title>

    <style>
        header {
            font-size: 65px;
            color: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin: 0px;
            height: 800px;
            display: flex;
            align-items: center;
            background-color: black;
        }

        header h1 {
            color: white;
            font-family: 'Courier New', Courier, monospace;

            overflow: hidden;
            white-space: nowrap;

            border-right: 5px solid white;

            width: 0;

            animation:
                typing 3.5s steps(19) forwards,
                blink 0.8s infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 16ch;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
    </style>

            height: 60px;

        a {

        }

        }

        main {
            font-weight: bold;
            background-color: black;
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
    </style>

</head>
