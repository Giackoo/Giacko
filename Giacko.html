<!DOCTYPE html>

<head>

    <title>Typing Header</title>

    <style>
        header {
            font-size: 65px;
            color: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin: 0px;
            height: 800px;
            display: flex;
            align-items: center;
            background-color: black;
        }

        header h1 {
            color: white;
            font-family: 'Courier New', Courier, monospace;

            overflow: hidden;
            white-space: nowrap;

            border-right: 5px solid white;

            width: 0;

            animation:
                typing 3.5s steps(19) forwards,
                blink 0.8s infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 22ch;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
    </style>


    <title>Document</title>

    <style>

        p {

            color: white;
        }

        nav{
            font-family:'Courier New', Courier, monospace;
            font-size: 30px;
            padding: 80px;
            
            background-color:#daa520;
            height: 60px;
            border-radius: 8px;
            transition:transform 0.4s ease;
            
        }


        img{
            padding: 40px;
        }

        a{
            color: black;
            text-decoration: none;
        }

        a:hover{
            text-decoration: underline;
            color: white;
            font-size: 35px;
        }

        main{
            background-color: black; 
            padding: 20px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            text-align: center;
        }

    </style>



</head>
