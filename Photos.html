        header h1 {
            color: white;
            font-family: 'Courier New', Courier, monospace;

            overflow: hidden;
            white-space: nowrap;

            border-right: 5px solid white;

            width: 0;

            animation:
                typing 3s steps(10) forwards,
                blink 0.8s infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 18ch;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
    </style>
